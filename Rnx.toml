# rnx 任务编排文件
# 项目地址: https://gitee.com/MM-Q/rnx.git
# 使用方法: rnx --run <任务名>

# 全局配置
[global]
# 工作目录
work_dir = '.'
# 超时时间
timeout = '30s'
# 是否显示输出
show_output = false
# 任务执行失败时是否退出程序
exit_on_error = true
# 是否显示执行的命令
show_cmd = false
# 命令黑名单
blacklist = []
# 并行执行的任务列表
parallel_tasks = []

# 全局变量
[global.vars]
app_name = 'psm'
exec_path = '{{output_dir}}/{{app_name}}.exe'
git_version = '@git describe --tags --always --dirty'
ldflags = "-s -w -X 'gitee.com/MM-Q/verman.appName={{app_name}}' -X 'gitee.com/MM-Q/verman.gitVersion={{git_version}}'"
main_path = 'main.go'
output_dir = './build/bin'
release_name = '{{app_name}}-windows-amd64-{{git_version}}.zip'

# 任务定义
[task]
[task.build]
# 任务描述
desc = '构建程序'
# 命令列表
cmds = [
    'wails build -ldflags "{{ldflags}}"'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = [
    'fc'
]
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []

[task.clean]
# 任务描述
desc = '清理构建目录'
# 命令列表
cmds = [
    'fck rm -f {{output_dir}}/*'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = []
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []

[task.fc]
# 任务描述
desc = '格式化代码并静态分析'
# 命令列表
cmds = [
    'golangci-lint fmt ./...',
    'golangci-lint run ./...'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = []
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []

[task.release]
# 任务描述
desc = '发布程序'
# 命令列表
cmds = [
    'wails build -ldflags "{{ldflags}}"',
    'upx {{exec_path}}',
    'fck pack -o {{output_dir}}/{{release_name}} {{exec_path}}',
    'fck rm -f {{exec_path}}'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = [
    'fc'
]
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = []

[task.run]
# 任务描述
desc = '运行程序'
# 命令列表
cmds = [
    'wails build -debug -ldflags "{{ldflags}}"',
    '{{exec_path}}'
]
# 任务工作目录
work_dir = ''
# 依赖任务列表
depends_on = [
    'fc'
]
# 支持运行的平台, 为空时表示支持所有平台(支持配置为: windows, linux, darwin)
platform = [
    'windows'
]
